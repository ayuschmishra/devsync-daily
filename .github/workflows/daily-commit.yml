name: Daily Commit Workflow

on:
  schedule:
    - cron: '47 9 * * *'   # Runs every day at 09:47 UTC
  workflow_dispatch:        # Allows manual triggering (for testing!)

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git identity
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "23f2003585@ds.study.iitm.ac.in"

      - name: Update daily log - 23f2003585@ds.study.iitm.ac.in
        run: |
          echo "Daily update on $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> daily-log.txt

      - name: Commit and push changes
        run: |
          git add daily-log.txt
          git commit -m "chore: automated daily update $(date -u '+%Y-%m-%d')"
          git push
